;title='DBI Fan Translations'
;creator='Kefir Team'
;version='895'
;color='green'

[Update list of translations]
try:
notify-now 'Updating translation list...'
download https://github.com/rashevskyv/DBI_watcher/raw/main/output/package.ini '/config/ultrahand/downloads/dbi.package.ini'
move '/config/ultrahand/downloads/dbi.package.ini' '/switch/.packages/DBI/Fan Translations/package.ini'

[Belarusian]
try:
notify-now 'Installing Belarusian...'
download https://github.com/rashevskyv/DBIPatcher/releases/latest/download/DBI.nro /switch/DBI/DBI_new.nro
download https://github.com/rashevskyv/DBIPatcher/releases/latest/download/translation_be.bin /switch/DBI/translation_new.bin
move /switch/DBI/DBI_new.nro /switch/DBI/DBI.nro
move /switch/DBI/translation_new.bin /switch/DBI/translation.bin

